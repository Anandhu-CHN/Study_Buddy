        { id: "ss", n: "Signals & Systems", l: ["https://youtube.com/playlist?list=PL9RcWoqXmzaIG-RWneeqDJ-FCt66S15pl", "https://youtube.com/playlist?list=PLBlnK6fEyqRhG6s3jYIU48CqsT5cyiDTO"] },
        { id: "de", n: "Digital Electronics", l: ["https://youtube.com/playlist?list=PLs5_Rtf2P2r41iuDKULDHHnIwfXyTAxBH", "https://youtube.com/playlist?list=PLBlnK6fEyqRjMH3mWf6kwqiTbT798eAOm"] },
        { id: "me", n: "Measurements", l: ["https://youtube.com/playlist?list=PLs5_Rtf2P2r69m2DL5loIcjGKCkQxXqHy", "https://youtube.com/playlist?list=PLgzsL8klq6DLxfNy8vX2ADCr-iukkDfy0"] },
        { id: "cs", n: "Control Systems", l: ["https://youtube.com/playlist?list=PLgzsL8klq6DKZ90WlGyN3UH3Xu11toztr", "https://youtube.com/playlist?list=PLBlnK6fEyqRhqzJT87LsdQKYZBC93ezDo"] },
        { id: "ae", n: "Analog Electronics", l: ["https://youtube.com/playlist?list=PLs5_Rtf2P2r5MplAOADz3fTWIyBZTkGbB", "https://youtube.com/playlist?list=PLBlnK6fEyqRiw-GZRqfnlVIBz9dxrqHJS"] },
        { id: "emft", n: "EMFT", l: ["https://youtube.com/playlist?list=PLs5_Rtf2P2r5AJvc-EuBEwdur_dUVojW-", "https://youtube.com/playlist?list=PLs5_Rtf2P2r7V6SAHIh95m3hP1bQ1OXor"] },
        { id: "mt", n: "Eng. Maths", l: ["https://youtube.com/playlist?list=PLvTTv60o7qj_tdY9zH7YceES7jfXiZkAz", "https://youtube.com/playlist?list=PL6Hn_dJKTVOmrb3OWIe5kaB0d5C2nwckH"] },
        { id: "mach", n: "Electrical Machines", l: ["https://youtube.com/playlist?list=PLs5_Rtf2P2r5YY5b23uDGrtpo42ezMmGp"] },
        { id: "ps", n: "Power Systems", l: ["https://youtube.com/playlist?list=PLe8lX1SLwAPG_ssxiyipma2oHqeusP3co"] },
        { id: "ga", n: "General Aptitude", l: ["https://youtube.com/playlist?list=PLvTTv60o7qj_ZT2pXjgXxue0AlgkpH0ZO", "https://youtube.com/playlist?list=PLs5_Rtf2P2r6tRocC0MJp4vghbANkCeJR"] },
        { id: "pe", n: "Power Electronics", l: ["https://youtube.com/playlist?list=PLs5_Rtf2P2r5KREX_ijxw2Sz-ISNhAgH4", "https://youtube.com/playlist?list=PLgzsL8klq6DLcJrFzyhLBm48mObP0xmuA"] }
    ];
    const books = [
        { n: "PW GATEWALLAH Electrical Engineering - PyQs (latest Upcoming)", l: "https://www.amazon.in/GATEWALLAH-Electrical-Engineering-Topicwise-Previous/dp/9378180167/ref=sr_1_1" },
        { n: "PW GATEWALLAH Electrical Engineering - PyQs (2025 Edition)", l: "https://www.amazon.in/GATEWALLAH-Electrical-Engineering-Previous-Paperback/dp/9371537256/ref=sr_1_2" }
    ];
    function init() {
        document.getElementById('hub').innerHTML = subjects.map(s => {
            const isDone = localStorage.getItem('done-' + s.id) === 'true';
            return `<div class="card" style="border: 2px solid ${isDone ? '#22c55e' : 'transparent'}"><h3>${s.n} ${isDone ? '✅' : ''}</h3>${s.l.map((l, i) => `<button onclick="window.open('${l}')" style="background:#e0e7ff; color:#4338ca; margin-bottom:5px;">Playlist ${i+1}</button>`).join('')}<input type="number" id="cnt-${s.id}" placeholder="Lectures Watched" onchange="saveProgress('${s.id}')"><button onclick="saveProgress('${s.id}')">Save Progress</button><button onclick="toggleComplete('${s.id}')" style="background: ${isDone ? '#ef4444' : '#22c55e'}; margin-top:10px;">${isDone ? 'Mark Incomplete' : 'Mark Completed'}</button></div>`;
        }).join('');
        document.getElementById('book-list').innerHTML = books.map(b => `<div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;"><span>${b.n}</span><button onclick="window.open('${b.l}')" style="width:auto; padding:5px 10px; background:#d97706;">View</button></div>`).join('');
        subjects.forEach(s => { const saved = localStorage.getItem('cnt-' + s.id); if(saved) document.getElementById('cnt-'+s.id).value = saved; });
        const savedTasks = JSON.parse(localStorage.getItem('tasks') || '[]');
        savedTasks.forEach(t => renderTask(t));
        renderTT();
        const savedBg = localStorage.getItem('bg');
        if (savedBg) document.body.style.backgroundImage = 'url(' + savedBg + ')';
    }
    function saveProgress(id) { localStorage.setItem('cnt-' + id, document.getElementById('cnt-'+id).value); alert('Progress Saved!'); }
    function toggleComplete(id) { localStorage.setItem('done-' + id, localStorage.getItem('done-' + id) !== 'true'); init(); }
    function openSyllabus() { window.open("./Resourses/Gate_EE_2026_Syllabus_copy (1).pdf"); }
    function handleTTUpload(e) { const reader = new FileReader(); reader.onload = (ev) => { localStorage.setItem('tt', ev.target.result); renderTT(); }; reader.readAsDataURL(e.target.files[0]); }
    function renderTT() { const data = localStorage.getItem('tt'); if (data) document.getElementById('tt-display').innerHTML = `<img src="${data}" style="width:100%; border-radius:10px;">`; }
    function addTimedTask() { const t = document.getElementById('task-input').value; const time = document.getElementById('time-input').value; if (!t || !time) return; const task = { id: Date.now(), t, time }; let tasks = JSON.parse(localStorage.getItem('tasks') || '[]'); tasks.push(task); localStorage.setItem('tasks', JSON.stringify(tasks)); renderTask(task); }
    function renderTask(task) { const div = document.createElement('div'); div.id = `task-${task.id}`; div.style.cssText = "background:#e0e7ff; padding:10px; border-radius:10px; margin-top:8px; display:flex; justify-content:space-between; align-items:center;"; div.innerHTML = `<span><strong>${task.time}</strong> - ${task.t}</span><button onclick="removeTask(${task.id})" style="width:auto; padding:5px 10px; background:#ef4444; margin:0;">×</button>`; document.getElementById('gen-tags').appendChild(div); }
    function removeTask(id) { let tasks = JSON.parse(localStorage.getItem('tasks') || '[]'); tasks = tasks.filter(t => t.id !== id); localStorage.setItem('tasks', JSON.stringify(tasks)); document.getElementById(`task-${id}`).remove(); }
    window.onload = init;
</script>
